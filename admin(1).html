<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم ماهر</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #888899;
    --success: #4ade80;
    --danger: #f87171;
  }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 380px;
    text-align: center;
    box-shadow: 0 0 60px rgba(108,99,255,0.15);
  }

  .login-logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: white;
  }

  .login-box h1 { font-size: 22px; margin-bottom: 8px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  .input-group input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
  .btn-primary:active { transform: translateY(0); }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 10px;
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* DASHBOARD */
  #dashboard { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 18px;
  }

  .header-logo span { font-weight: 700; font-size: 18px; }

  .header-actions { display: flex; align-items: center; gap: 16px; }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }

  .stat-num { font-size: 36px; font-weight: 800; color: var(--accent); }
  .stat-label { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* UPLOAD SECTION */
  .section-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before {
    content: '';
    width: 4px;
    height: 24px;
    background: linear-gradient(var(--accent), var(--accent2));
    border-radius: 4px;
  }

  .upload-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label { font-size: 13px; color: var(--muted); font-weight: 600; }

  .form-group input,
  .form-group textarea,
  .form-group select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    text-align: right;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-group select option { background: var(--card); }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(108,99,255,0.05);
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { font-size: 48px; margin-bottom: 12px; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .upload-zone strong { color: var(--accent); }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .preview-item {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 1;
    background: var(--surface);
  }

  .preview-item img,
  .preview-item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(248,113,113,0.9);
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    cursor: pointer;
    color: white;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-item .file-type-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.7);
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 10px;
    color: white;
  }

  .btn-upload {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
  .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--success);
    color: #0a0a0f;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
    box-shadow: 0 8px 32px rgba(74,222,128,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* WORKS GRID */
  .works-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .work-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .work-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .work-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .work-thumb img,
  .work-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .work-thumb .media-count {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  .work-type-badge {
    position: absolute;
    bottom: 10px;
    left: 10px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }

  .badge-design { background: rgba(108,99,255,0.85); color: white; }
  .badge-video { background: rgba(255,101,132,0.85); color: white; }
  .badge-photo { background: rgba(74,222,128,0.85); color: #0a0a0f; }
  .badge-motion { background: rgba(251,191,36,0.85); color: #0a0a0f; }
  .badge-brand { background: rgba(99,179,237,0.85); color: #0a0a0f; }

  .work-info { padding: 16px; }
  .work-info h3 { font-size: 15px; margin-bottom: 6px; }
  .work-info p { color: var(--muted); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .work-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-delete {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--danger);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .btn-delete:hover { background: rgba(248,113,113,0.2); }

  .btn-toggle {
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.3);
    color: var(--accent);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    width: fit-content;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: transparent;
  }

  .tab.active {
    background: var(--card);
    color: var(--text);
    font-weight: 600;
  }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    header { padding: 12px 16px; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">م</div>
    <h1>لوحة التحكم</h1>
    <p>سجل دخولك عشان تدير أعمالك</p>
    <div class="input-group">
      <input type="text" id="usernameInput" placeholder="اسم المستخدم" />
    </div>
    <div class="input-group">
      <input type="password" id="passwordInput" placeholder="كلمة المرور" onkeypress="if(event.key==='Enter') login()" />
    </div>
    <button class="btn-primary" onclick="login()">دخول ← </button>
    <div class="error-msg" id="errorMsg">اسم المستخدم أو كلمة المرور غلط!</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="header-logo">
      <div class="logo-icon">م</div>
      <span>لوحة تحكم ماهر</span>
    </div>
    <div class="header-actions">
      <span style="color:var(--muted);font-size:13px">أهلاً، ماهر 👋</span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </header>

  <div class="main">
    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">إجمالي الأعمال</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statVisible" style="color:var(--success)">0</div>
        <div class="stat-label">ظاهر في البورتفوليو</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statHidden" style="color:var(--muted)">0</div>
        <div class="stat-label">مخفي</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('upload', this)">➕ رفع عمل جديد</button>
      <button class="tab" onclick="switchTab('manage', this)">🗂 إدارة الأعمال</button>
    </div>

    <!-- UPLOAD TAB -->
    <div id="uploadTab">
      <div class="section-title">رفع عمل جديد</div>
      <div class="upload-form">
        <div class="form-grid">
          <div class="form-group">
            <label>عنوان العمل *</label>
            <input type="text" id="workTitle" placeholder="مثلاً: بوستر فعالية طلابية" />
          </div>
          <div class="form-group">
            <label>نوع العمل</label>
            <select id="workType">
              <option value="design">تصميم جرافيك</option>
              <option value="video">مونتاج فيديو</option>
              <option value="photo">تصوير فوتوغرافي</option>
              <option value="motion">موشن جرافيك</option>
              <option value="brand">هوية بصرية</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:16px">
          <label>وصف العمل</label>
          <textarea id="workDesc" placeholder="اكتب تفاصيل العمل، الأدوات المستخدمة، الهدف منه..."></textarea>
        </div>

        <div class="form-group" style="margin-bottom:16px">
          <label>الأدوات المستخدمة (اختياري)</label>
          <input type="text" id="workTools" placeholder="مثلاً: Photoshop, Premiere, After Effects" />
        </div>

        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" multiple accept="image/*,video/*" onchange="handleFiles(this.files)" />
          <div class="upload-icon">📁</div>
          <p><strong>اسحب الملفات هنا</strong> أو اضغط للاختيار</p>
          <p style="margin-top:8px;font-size:12px">صور (JPG, PNG, GIF) وفيديو (MP4, MOV) — بدون حد للعدد</p>
        </div>

        <div class="preview-grid" id="previewGrid"></div>

        <button class="btn-upload" onclick="saveWork()">
          <span>⬆️</span> رفع العمل على البورتفوليو
        </button>
      </div>
    </div>

    <!-- MANAGE TAB -->
    <div id="manageTab" class="hidden">
      <div class="section-title">إدارة الأعمال</div>
      <div class="works-grid" id="worksGrid">
        <div class="empty-state">
          <div class="empty-icon">🖼️</div>
          <p>لسه ما رفعتش أي أعمال</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================
// CONFIG — غير هنا فقط!
// =====================
const ADMIN_USER = 'maher';
const ADMIN_PASS = 'maher2026';

const SUPABASE_URL = 'https://rxhfflxcxmnkhzqvcnxi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable__s2TWfwgLsK6KBDW-C2V5Q_rZQW2oBZ';
const MEDIA_BUCKET = 'portfolio-media';
// =====================

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selectedFiles = [];
let works = [];

// LOGIN
function login() {
  const u = document.getElementById('usernameInput').value.trim();
  const p = document.getElementById('passwordInput').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    loadWorks();
  } else {
    document.getElementById('errorMsg').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

// TABS
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('uploadTab').classList.toggle('hidden', tab !== 'upload');
  document.getElementById('manageTab').classList.toggle('hidden', tab !== 'manage');
  if (tab === 'manage') loadWorks();
}

// FILE HANDLING
function handleFiles(files) {
  Array.from(files).forEach(f => selectedFiles.push(f));
  renderPreviews();
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    const url = URL.createObjectURL(f);
    const isVideo = f.type.startsWith('video');
    div.innerHTML = `
      ${isVideo
        ? `<video src="${url}" muted></video>`
        : `<img src="${url}" />`}
      <button class="remove-btn" onclick="removeFile(${i})">✕</button>
      <span class="file-type-badge">${isVideo ? '🎬' : '🖼️'}</span>
    `;
    grid.appendChild(div);
  });
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  renderPreviews();
}

// DRAG & DROP
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

// SAVE WORK
async function saveWork() {
  const title = document.getElementById('workTitle').value.trim();
  if (!title) { showToast('❌ أدخل عنوان العمل', '#f87171'); return; }
  if (selectedFiles.length === 0) { showToast('❌ ارفع ملف واحد على الأقل', '#f87171'); return; }

  const saveBtn = document.querySelector('.btn-upload');
  saveBtn.disabled = true;

  try {
    const mediaItems = [];
    for (let i = 0; i < selectedFiles.length; i++) {
      saveBtn.innerHTML = `<span>⏳</span> رفع الملفات (${i + 1}/${selectedFiles.length})...`;
      const file = selectedFiles[i];
      const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
      const path = `works/${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${safeName}`;

      const { error: upErr } = await supabaseClient.storage
        .from(MEDIA_BUCKET)
        .upload(path, file, { cacheControl: '3600', upsert: false });

      if (upErr) throw upErr;

      const { data: urlData } = supabaseClient.storage.from(MEDIA_BUCKET).getPublicUrl(path);

      mediaItems.push({
        url: urlData.publicUrl,
        path,
        type: file.type.startsWith('video') ? 'video' : 'image',
        name: file.name
      });
    }

    saveBtn.innerHTML = `<span>⏳</span> جاري الحفظ...`;

    const { error: insErr } = await supabaseClient.from('works').insert({
      title,
      type: document.getElementById('workType').value,
      description: document.getElementById('workDesc').value.trim(),
      tools: document.getElementById('workTools').value.trim(),
      media: mediaItems,
      visible: true
    });

    if (insErr) throw insErr;

    resetForm();
    await loadWorks();
    showToast('✅ تم رفع العمل بنجاح!');
  } catch (err) {
    console.error(err);
    showToast('❌ حصل خطأ: ' + (err.message || 'حاول مرة أخرى'), '#f87171');
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<span>⬆️</span> رفع العمل على البورتفوليو';
  }
}

function resetForm() {
  document.getElementById('workTitle').value = '';
  document.getElementById('workDesc').value = '';
  document.getElementById('workTools').value = '';
  document.getElementById('workType').value = 'design';
  selectedFiles = [];
  renderPreviews();
}

// LOAD WORKS FROM SUPABASE
async function loadWorks() {
  const { data, error } = await supabaseClient
    .from('works')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    showToast('❌ خطأ في تحميل الأعمال', '#f87171');
    return;
  }

  works = data || [];
  updateStats();
  if (!document.getElementById('manageTab').classList.contains('hidden')) {
    renderWorks();
  }
}

function updateStats() {
  const visible = works.filter(w => w.visible).length;
  document.getElementById('statTotal').textContent = works.length;
  document.getElementById('statVisible').textContent = visible;
  document.getElementById('statHidden').textContent = works.length - visible;
}

// RENDER WORKS
const typeLabels = {
  design: ['تصميم جرافيك', 'badge-design'],
  video: ['مونتاج فيديو', 'badge-video'],
  photo: ['تصوير', 'badge-photo'],
  motion: ['موشن جرافيك', 'badge-motion'],
  brand: ['هوية بصرية', 'badge-brand']
};

function renderWorks() {
  const grid = document.getElementById('worksGrid');
  if (works.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🖼️</div><p>لسه ما رفعتش أي أعمال</p></div>`;
    return;
  }

  grid.innerHTML = works.map((w, i) => {
    const first = w.media[0];
    const isVideo = first.type === 'video';
    const [label, badge] = typeLabels[w.type] || ['أخرى', 'badge-design'];
    const dateStr = w.created_at ? new Date(w.created_at).toLocaleDateString('ar-EG') : '';
    return `
      <div class="work-card" style="${!w.visible ? 'opacity:0.5' : ''}">
        <div class="work-thumb">
          ${isVideo
            ? `<video src="${first.url}" muted></video>`
            : `<img src="${first.url}" />`}
          ${w.media.length > 1 ? `<div class="media-count">📎 ${w.media.length}</div>` : ''}
          <span class="work-type-badge ${badge}">${label}</span>
        </div>
        <div class="work-info">
          <h3>${w.title}</h3>
          ${w.description ? `<p>${w.description}</p>` : ''}
          ${w.tools ? `<p style="margin-top:6px;color:var(--accent);font-size:11px">🛠 ${w.tools}</p>` : ''}
          <p style="margin-top:8px;font-size:11px;color:var(--muted)">📅 ${dateStr}</p>
        </div>
        <div class="work-actions">
          <button class="btn-toggle" onclick="toggleWork(${i})">
            ${w.visible ? '🙈 إخفاء' : '👁 إظهار'}
          </button>
          <button class="btn-delete" onclick="deleteWork(${i})">🗑 حذف</button>
        </div>
      </div>
    `;
  }).join('');
}

async function toggleWork(i) {
  const w = works[i];
  const newVisible = !w.visible;
  const { error } = await supabaseClient.from('works').update({ visible: newVisible }).eq('id', w.id);
  if (error) {
    console.error(error);
    showToast('❌ حصل خطأ، حاول تاني', '#f87171');
    return;
  }
  w.visible = newVisible;
  updateStats();
  renderWorks();
}

async function deleteWork(i) {
  if (!confirm('متأكد إنك عاوز تحذف العمل ده؟')) return;
  const w = works[i];

  // حذف الملفات من Storage
  const paths = (w.media || []).map(m => m.path).filter(Boolean);
  if (paths.length) {
    const { error: removeErr } = await supabaseClient.storage.from(MEDIA_BUCKET).remove(paths);
    if (removeErr) console.error(removeErr);
  }

  // حذف السجل من الجدول
  const { error } = await supabaseClient.from('works').delete().eq('id', w.id);
  if (error) {
    console.error(error);
    showToast('❌ حصل خطأ في الحذف', '#f87171');
    return;
  }

  works.splice(i, 1);
  updateStats();
  renderWorks();
  showToast('🗑 تم حذف العمل');
}

// TOAST
function showToast(msg, color = '#4ade80') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.color = color === '#4ade80' ? '#0a0a0f' : 'white';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
